services:
  document-vault:
    image: larsmikki/document-vault:latest
    container_name: document-vault
    ports:
      - "3110:3110"
    environment:
      - PORT=3110
    volumes:
      - /volume2/docker/document-vault:/app/vault
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3110/api/health"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 90s

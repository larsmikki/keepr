services:
  documentr:
    image: larsmikki/documentr:latest
    container_name: documentr
    ports:
      - "3110:3110"
    environment:
      - PORT=3110
    volumes:
      - /volume2/docker/documentr:/app/vault
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3110/api/health"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 90s
